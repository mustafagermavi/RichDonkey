<div class="glass-card">
    <h3 style="display:flex; gap:10px; align-items:center; margin-bottom:20px;">
        <i data-lucide="refresh-cw" style="color:var(--accent)"></i> Trade Terminal
    </h3>
    
    <div class="premium-input" style="display:flex; justify-content:space-between; align-items:center;">
        <input type="number" id="swapIn" placeholder="0.0" style="background:none; border:none; color:white; outline:none; width:70%; font-size:1.1rem; font-weight:700;">
        <span style="color:var(--accent); font-weight:800; font-size:0.8rem;">ETH</span>
    </div>
    
    <div style="text-align:center; margin:5px; color:var(--dim);"><i data-lucide="arrow-down" style="width:16px;"></i></div>
    
    <div class="premium-input" style="display:flex; justify-content:space-between; align-items:center;">
        <input type="number" id="swapOut" placeholder="0.0" readonly style="background:none; border:none; color:white; outline:none; width:70%; font-size:1.1rem; font-weight:700;">
        <span style="color:var(--accent); font-weight:800; font-size:0.8rem;">TOKEN</span>
    </div>
    
    <button class="btn-launch" style="background:white; color:black; margin-top:15px;" onclick="alert('Trade Executed!')">EXECUTE SWAP</button>
</div>
