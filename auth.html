<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMECORP | Secure Access</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
    <style>
        /* تایبەت بەم لاپەڕەیە: ناوەندکردنی فۆرمەکە */
        .auth-container {
            height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            background: radial-gradient(circle at top right, var(--accent-glow), transparent 40%);
        }

        .auth-card {
            width: 100%;
            max-width: 420px;
            padding: 50px;
            text-align: center;
            animation: fadeIn 0.8s ease-out;
        }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(20px); }
            to { opacity: 1; transform: translateY(0); }
        }

        .auth-logo { font-size: 2rem; font-weight: 800; margin-bottom: 30px; letter-spacing: -2px; }
        
        .method-selector {
            display: flex; gap: 10px; margin-bottom: 30px;
            background: rgba(255,255,255,0.03); padding: 5px; border-radius: 12px;
        }

        .method-btn {
            flex: 1; padding: 10px; border-radius: 8px; border: none;
            background: transparent; color: var(--text-dim); cursor: pointer; font-weight: 600;
        }

        .method-btn.active { background: var(--card); color: var(--text-main); box-shadow: 0 4px 15px rgba(0,0,0,0.2); }

        .divider { display: flex; align-items: center; gap: 10px; color: var(--text-dim); font-size: 0.7rem; margin: 25px 0; }
        .divider::before, .divider::after { content: ""; flex: 1; height: 1px; background: var(--border); }
    </style>
</head>
<body data-theme="dark">

    <div class="auth-container">
        <div class="glass-card auth-card">
            <div class="auth-logo">
                <i data-lucide="shield-check" class="accent-color" style="width: 48px; height: 48px; margin-bottom: 10px;"></i>
                <br>MEME<span>CORP</span>
            </div>

            <h2 style="margin-bottom: 10px;">Access Terminal</h2>
            <p class="dim-text" style="font-size: 0.9rem; margin-bottom: 30px;">Connect your identity to continue.</p>

            <button class="btn-launch" style="background: white; color: black; display: flex; align-items: center; justify-content: center; gap: 10px;" onclick="simulateLogin()">
                <i data-lucide="wallet"></i> Connect Wallet
            </button>

            <div class="divider">OR USE SEED PHRASE</div>

            <input type="password" class="premium-input" placeholder="Enter recovery phrase..." style="margin-top: 0;">
            
            <button class="btn-launch" onclick="simulateLogin()">ENTER DASHBOARD</button>

            <p style="margin-top: 25px; font-size: 0.8rem;" class="dim-text">
                New here? <a href="#" class="accent-color" style="text-decoration: none;">Create an account</a>
            </p>
        </div>
    </div>

    <script>
        lucide.createIcons();

        function simulateLogin() {
            // ئەنیمەیشنێکی بچووک بۆ دوگمەکە پێش چوونە ژوورەوە
            const btn = event.target;
            btn.innerText = "Verifying...";
            btn.style.opacity = "0.7";
            
            setTimeout(() => {
                window.location.href = "index.html"; // دەچێتە سەر لاپەڕەی داشبۆرد
            }, 1500);
        }
    </script>
</body>
</html>
