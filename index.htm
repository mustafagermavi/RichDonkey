<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MEMECORP | Premium Terminal</title>
    <link rel="stylesheet" href="style.css">
    <link href="https://fonts.googleapis.com/css2?family=Plus+Jakarta+Sans:wght@200;400;600;800&display=swap" rel="stylesheet">
    <script src="https://unpkg.com/lucide@latest"></script>
</head>
<body data-theme="dark">

    <div id="navbar-placeholder"></div>
    <div id="sidebar-placeholder"></div>

    <main class="dashboard-grid">
        <div class="glass-card hero-module">
            <h4 class="accent-label">CORE PROTOCOL</h4>
            <h1>The World's Most <br> Advanced Token Engine.</h1>
            <p class="dim-text">Experience professional blockchain deployment with our automated foundry.</p>
        </div>

        <div class="glass-card stat-module">
            <i data-lucide="bar-chart-2" class="accent-color"></i>
            <p class="dim-text">TOTAL VOLUME</p>
            <h2 class="stat-number">$142.5M</h2>
        </div>

        <div class="glass-card action-module">
            <h3>Deploy Token Instance</h3>
            <input type="text" class="premium-input" placeholder="Enter Token Name">
            <button class="btn-launch">INITIALIZE DEPLOYMENT</button>
        </div>
    </main>

    <script src="script.js"></script>
</body>
</html>
